name: Release

# Build and publish the three ConnectLens images to GHCR.
# Trigger by pushing a semver tag (git tag v0.1.0 && git push origin v0.1.0),
# or run manually from the Actions tab (workflow_dispatch) with a tag input.

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. v0.1.0 or latest)'
        required: true
        default: 'latest'

permissions:
  contents: write
  packages: write

jobs:
  images:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: connectlens-backend
            context: ./backend
          - image: connectlens-frontend
            context: ./frontend
          - image: connectlens-connect
            context: ./connect
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  release:
    name: GitHub Release
    needs: images
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Version tag (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## ConnectLens ${{ github.ref_name }}

            Prebuilt images published to GHCR (image tag omits the leading `v`):

            ```bash
            docker pull ghcr.io/${{ steps.owner.outputs.owner }}/connectlens-backend:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/${{ steps.owner.outputs.owner }}/connectlens-frontend:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/${{ steps.owner.outputs.owner }}/connectlens-connect:${{ steps.ver.outputs.version }}
            ```

            Or run the whole stack against these images:

            ```bash
            docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d
            ```
