# Overlay that pulls the three ConnectLens images from GHCR instead of building
# them locally. Requires Docker Compose v2.24+ (for the `!reset` tag).
#
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d
#
# Pin a specific release by replacing `latest` with a tag, e.g. v0.1.0.
services:
  connect:
    build: !reset null
    image: ghcr.io/juhunc/connectlens-connect:latest
    pull_policy: always

  backend:
    build: !reset null
    image: ghcr.io/juhunc/connectlens-backend:latest
    pull_policy: always

  frontend:
    build: !reset null
    image: ghcr.io/juhunc/connectlens-frontend:latest
    pull_policy: always
