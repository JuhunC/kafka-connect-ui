server:
  port: 8090
  # Keep SSE connections alive
  tomcat:
    connection-timeout: 3600000

spring:
  application:
    name: connectlens-backend
  mvc:
    async:
      request-timeout: -1   # never time out async (SSE) requests

logging:
  level:
    com.connectlens: INFO
    org.apache.kafka: WARN

connectlens:
  # Cluster registry. Override / extend via env:
  #   CONNECTLENS_CLUSTERS_0_ID, _NAME, _BOOTSTRAP, _CONNECT
  #   CONNECTLENS_CLUSTERS_1_ID, ...  (multi-cluster: increment the index)
  clusters:
    - id: local
      name: Local Dev
      bootstrap: kafka:9092
      connect: http://connect:8083
  poll:
    fast-ms: 4000     # connector/task status cadence
    slow-ms: 30000    # cluster metadata + consumer-group lag cadence
  oidc:
    # issuer = what the browser-minted token carries (Keycloak KC_HOSTNAME)
    issuer: http://localhost:8081/realms/connectlens
    # jwks = internal URL the backend uses to fetch signing keys
    jwks: http://keycloak:8080/realms/connectlens/protocol/openid-connect/certs
  cors:
    # Dev origins allowed to call the API directly (prod is same-origin via nginx)
    allowed-origins: http://localhost:8080,http://localhost:5173
