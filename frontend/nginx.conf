# ConnectLens frontend nginx config.
# - Serves the built SPA with history-mode fallback.
# - Reverse-proxies /api/ to the backend.
# - Special-cases the SSE endpoint (/api/clusters/*/events) so streaming works:
#   no buffering, no caching, long read timeout, HTTP/1.1.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- SSE stream: /api/clusters/{clusterId}/events -----------------------
    # Must be declared before the generic /api/ block so it wins the match.
    # Disable every layer of buffering so events flush to the browser live.
    location ~ ^/api/clusters/[^/]+/events$ {
        proxy_pass http://backend:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    # ---- Regular API calls --------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # ---- SPA -----------------------------------------------------------------
    # History-mode routing: unknown paths fall back to index.html.
    location / {
        try_files $uri /index.html;
    }
}
